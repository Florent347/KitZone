<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>National Teams — KitZone</title>
<meta name="description" content="Shop official national team football jerseys from around the world."/>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body data-page="nt">
<header class="header" data-header></header>

<section class="page-hero">
  <div class="container">
    <div class="eyebrow">National Teams</div>
    <h1>Wear your colours</h1>
    <p>Ten nations. Every major tournament kit from 2016 to 2026.</p>
    <div class="filter-bar">
      <div class="relative">
        <input type="text" id="ntSearch" placeholder="Search national teams…" autocomplete="off"/>
        <div class="search-suggestions" id="ntSuggest"></div>
      </div>
    </div>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="grid-cards" id="ntGrid"></div>
  </div>
</section>

<footer class="footer" data-footer></footer>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  const grid = document.getElementById('ntGrid');
  const search = document.getElementById('ntSearch');
  const suggest = document.getElementById('ntSuggest');

  function render() {
    const q = search.value.trim().toLowerCase();
    const list = window.nationalTeams.filter(c => !q || c.name.toLowerCase().includes(q));
    if (!list.length) { grid.innerHTML = `<div style="grid-column:1/-1;color:var(--muted);padding:40px 0">No teams match your search.</div>`; return; }
    grid.innerHTML = list.map(c => `
      <a class="card reveal in" href="country.html?id=${c.id}">
        <div class="crest">${window.crestSVG(c.abbr, c.c1, c.c2)}</div>
        <h3>${c.name}</h3>
        <div class="meta">${c.continent}</div>
        <div class="link">Browse Jerseys →</div>
      </a>
    `).join('');
  }

  function renderSuggest() {
    const q = search.value.trim().toLowerCase();
    if (!q) { suggest.classList.remove('show'); return; }
    const list = window.nationalTeams.filter(c => c.name.toLowerCase().includes(q)).slice(0,5);
    if (!list.length) { suggest.classList.remove('show'); return; }
    suggest.innerHTML = list.map(c => `<a href="country.html?id=${c.id}"><span>${c.name}</span><span class="badge">${c.continent}</span></a>`).join('');
    suggest.classList.add('show');
  }

  search.addEventListener('input', () => { render(); renderSuggest(); });
  document.addEventListener('click', e => { if (!search.parentElement.contains(e.target)) suggest.classList.remove('show'); });
  render();
</script>
</body>
</html>
