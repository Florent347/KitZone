<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Contact — KitZone</title>
<meta name="description" content="Get in touch with the KitZone team."/>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body data-page="contact">
<header class="header" data-header></header>

<section class="page-hero">
  <div class="container">
    <div class="eyebrow">Contact</div>
    <h1>Talk to the team</h1>
    <p>Questions about a kit, an order, or personalisation? We're here.</p>
  </div>
</section>

<section class="section" style="padding-top:40px">
  <div class="container">
    <div class="team-grid reveal in">
      <div class="team-card"><div class="avatar">L</div><h4>Luca Ferrer</h4><div class="role">Founder</div></div>
      <div class="team-card"><div class="avatar">M</div><h4>Mia Sørensen</h4><div class="role">Customer Care</div></div>
      <div class="team-card"><div class="avatar">J</div><h4>Jamal Osei</h4><div class="role">Product Curation</div></div>
    </div>

    <div class="form-panel" style="margin-top:20px">
      <h2>Send us a message</h2>
      <p>We reply within 24 hours on business days.</p>
      <form id="contactForm" novalidate>
        <div class="form-group"><label>Name</label><input id="cName" type="text"/><div class="err" data-for="cName"></div></div>
        <div class="form-group"><label>Email</label><input id="cEmail" type="email"/><div class="err" data-for="cEmail"></div></div>
        <div class="form-group"><label>Subject</label>
          <select id="cSubject">
            <option value="">Select a subject…</option>
            <option>Order</option>
            <option>Return</option>
            <option>Product question</option>
            <option>Personalisation</option>
            <option>Other</option>
          </select>
          <div class="err" data-for="cSubject"></div>
        </div>
        <div class="form-group"><label>Message</label><textarea id="cMessage"></textarea><div class="err" data-for="cMessage"></div></div>
        <button class="btn btn-primary" type="submit">Send message</button>
        <div class="err" id="cResult" style="text-align:center;margin-top:12px"></div>
      </form>
    </div>
  </div>
</section>

<footer class="footer" data-footer></footer>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  function seterr(id, msg) { document.querySelector(`[data-for="${id}"]`).textContent = msg || ''; }
  document.getElementById('contactForm').addEventListener('submit', e => {
    e.preventDefault();
    ['cName','cEmail','cSubject','cMessage'].forEach(id => seterr(id,''));
    const name = document.getElementById('cName').value.trim();
    const email = document.getElementById('cEmail').value.trim();
    const subject = document.getElementById('cSubject').value;
    const message = document.getElementById('cMessage').value.trim();
    let ok = true;
    if (name.length < 2) { seterr('cName','Please enter your name.'); ok=false; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { seterr('cEmail','Invalid email.'); ok=false; }
    if (!subject) { seterr('cSubject','Choose a subject.'); ok=false; }
    if (message.length < 10) { seterr('cMessage','Message must be at least 10 characters.'); ok=false; }
    const result = document.getElementById('cResult');
    if (!ok) { result.textContent=''; return; }
    result.textContent = 'Message sent — we\'ll get back to you soon.'; result.style.color='#7ee2b8';
    e.target.reset();
  });
</script>
</body>
</html>
